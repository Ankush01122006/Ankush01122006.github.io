<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Page</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f3f4f6;
        text-align: center;
    }

    h1 {
        margin-top: 30px;
        font-size: 28px;
        text-decoration: underline;
        color: #1f2937;
    }

    .container {
        width: 90%;
        max-width: 900px;
        margin: 30px auto;
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .certificate-box img {
        width: 100%;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .btn-container {
        margin-top: 30px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
    }

    .btn {
        padding: 12px;
        border: 2px solid #2563eb;
        background: white;
        border-radius: 8px;
        cursor: pointer;
        font-size: 15px;
        transition: 0.3s;
    }

    .btn:hover {
        background: #2563eb;
        color: white;
    }
</style>
</head>

<body>

<h1>Congratulations on Completing Power BI Workshop</h1>

<div class="container">

    <div class="certificate-box">
        <img src="image (1).png" id="certificateImage" alt="Certificate">
    </div>

    <h2>Here is Your Certificate</h2>

    <div class="btn-container">
        <button class="btn" onclick="downloadCertificate()">Download Certificate</button>
        <button class="btn" onclick="shareCertificate()">Share Certificate</button>
        <button class="btn" onclick="shareLinkedIn()">Share on LinkedIn</button>
        <button class="btn" onclick="postLinkedIn()">Post on LinkedIn</button>
    </div>

</div>

<script>

const certificateURL = window.location.href;  // current page link

// ✅ Download Button
function downloadCertificate() {
    const link = document.createElement("a");
    link.href = "certificate.jpg";
    link.download = "PowerBI_Certificate.jpg";
    link.click();
}

// ✅ Native Share (Mobile Supported)
function shareCertificate() {
    if (navigator.share) {
        navigator.share({
            title: "My Power BI Certificate",
            text: "I have successfully completed the Power BI Workshop!",
            url: certificateURL
        });
    } else {
        alert("Sharing not supported on this browser. Use LinkedIn option.");
    }
}

// ✅ LinkedIn Share (Share URL)
function shareLinkedIn() {
    const linkedInURL = 
        "https://www.linkedin.com/sharing/share-offsite/?url=" 
        + encodeURIComponent(certificateURL);
    window.open(linkedInURL, "_blank");
}

// ✅ LinkedIn Post with Pre-filled Text
function postLinkedIn() {
    const text = encodeURIComponent(
        "I’m excited to share that I’ve successfully completed the Power BI Workshop! 🚀 #PowerBI #DataAnalytics"
    );

    const postURL = 
        "https://www.linkedin.com/feed/?shareActive=true&text=" + text;

    window.open(postURL, "_blank");
}

</script>

</body>
</html>
